name: Deploy semantic-draw

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find running pod
        id: find_pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          set -euo pipefail
          API_URL="https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}"

          echo "Finding running kiki pod..."
          PODS=$(curl -sf "$API_URL" \
            -H 'Content-Type: application/json' \
            -d '{"query": "query { myself { pods { id name desiredStatus runtime { uptimeInSeconds ports { ip isIpPublic privatePort publicPort type } } } } }"}')

          # Find a running pod named kiki-comfyui
          POD_ID=$(echo "$PODS" | jq -r '
            .data.myself.pods[]
            | select(.name == "kiki-comfyui" and .desiredStatus == "RUNNING")
            | .id' | head -1)

          if [ -z "$POD_ID" ] || [ "$POD_ID" = "null" ]; then
            echo "::error::No running kiki-comfyui pod found. Run 'Deploy RunPod' first."
            echo ""
            echo "Available pods:"
            echo "$PODS" | jq '.data.myself.pods[] | {id, name, status: .desiredStatus}'
            exit 1
          fi

          echo "Found pod: $POD_ID"

          # Extract SSH info
          SSH_IP=$(echo "$PODS" | jq -r "
            .data.myself.pods[]
            | select(.id == \"$POD_ID\")
            | .runtime.ports[]
            | select(.privatePort == 22)
            | .ip")
          SSH_PORT=$(echo "$PODS" | jq -r "
            .data.myself.pods[]
            | select(.id == \"$POD_ID\")
            | .runtime.ports[]
            | select(.privatePort == 22)
            | .publicPort")

          if [ -z "$SSH_IP" ] || [ "$SSH_IP" = "null" ]; then
            echo "::error::Pod $POD_ID has no SSH info. Is it fully booted?"
            exit 1
          fi

          echo "SSH: $SSH_IP:$SSH_PORT"
          echo "pod_id=$POD_ID" >> "$GITHUB_OUTPUT"
          echo "ssh_ip=$SSH_IP" >> "$GITHUB_OUTPUT"
          echo "ssh_port=$SSH_PORT" >> "$GITHUB_OUTPUT"

      - name: Set up semantic-draw via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RUNPOD_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          SSH_IP="${{ steps.find_pod.outputs.ssh_ip }}"
          SSH_PORT="${{ steps.find_pod.outputs.ssh_port }}"

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/runpod_key
          chmod 600 ~/.ssh/runpod_key

          SSH_CMD="ssh -i ~/.ssh/runpod_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -p $SSH_PORT root@$SSH_IP"
          SCP_CMD="scp -i ~/.ssh/runpod_key -o StrictHostKeyChecking=no -P $SSH_PORT"

          echo "Waiting for SSH..."
          SSH_CONNECTED=false
          for i in $(seq 1 12); do
            if $SSH_CMD "echo ok" 2>/dev/null; then
              echo "SSH connected!"
              SSH_CONNECTED=true
              break
            fi
            echo "  SSH attempt ${i}/12..."
            sleep 5
          done

          if [ "$SSH_CONNECTED" != "true" ]; then
            echo "::error::Failed to connect via SSH after 1 minute"
            exit 1
          fi

          # Copy the setup script
          $SCP_CMD scripts/setup-semantic-draw.sh root@"$SSH_IP":/tmp/setup-semantic-draw.sh

          # Run setup. The script handles its own readiness polling and exits
          # non-zero (with last 50 log lines) on failure, so the action's
          # exit status mirrors the script's.
          $SSH_CMD "chmod +x /tmp/setup-semantic-draw.sh && /tmp/setup-semantic-draw.sh"

      - name: Summary
        if: always()
        run: |
          POD_ID="${{ steps.find_pod.outputs.pod_id }}"
          SSH_IP="${{ steps.find_pod.outputs.ssh_ip }}"
          SSH_PORT="${{ steps.find_pod.outputs.ssh_port }}"

          echo "## semantic-draw Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Pod ID** | \`$POD_ID\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Gradio (on pod)** | \`http://localhost:8000\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Port 8000 is **not** exposed via the RunPod proxy. To access the Gradio UI from your laptop, open an SSH local-port-forward and leave it open:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "ssh -L 8000:localhost:8000 -i ~/.ssh/runpod_key -p $SSH_PORT root@$SSH_IP" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Then open <http://localhost:8000> in your laptop browser." >> "$GITHUB_STEP_SUMMARY"

name: Deploy FLUX.2-klein

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find or rent spot pod
        id: find_pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          set -euo pipefail
          API_URL="https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}"
          POD_NAME="kiki-flux-klein"
          GPU_ID="NVIDIA GeForce RTX 5090"
          # CUDA 13.0 + PyTorch 2.9.1 — required for FLUX.2-klein NVFP4 on Blackwell.
          IMAGE="runpod/pytorch:1.0.3-cu1300-torch291-ubuntu2404"
          PORTS="8766/http,22/tcp"
          BID_HEADROOM="0.02"

          # ── Reuse existing running pod if one is already up ──
          echo "Looking for running $POD_NAME pod..."
          PODS=$(curl -sf "$API_URL" \
            -H 'Content-Type: application/json' \
            -d '{"query": "query { myself { pods { id name desiredStatus } } }"}')

          POD_ID=$(echo "$PODS" | jq -r "
            .data.myself.pods[]
            | select(.name == \"$POD_NAME\" and .desiredStatus == \"RUNNING\")
            | .id" | head -1)

          if [ -n "$POD_ID" ] && [ "$POD_ID" != "null" ]; then
            echo "Found existing pod: $POD_ID"
          else
            echo "No running $POD_NAME pod. Discovering spot bid for $GPU_ID..."

            # ── Discover current spot price (secure cloud only — community has no spot for 5090) ──
            PRICE_RESP=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"query\": \"query { gpuTypes(input: { id: \\\"${GPU_ID}\\\" }) { lowestPrice(input: { gpuCount: 1, secureCloud: true }) { minimumBidPrice stockStatus } } }\"}")

            MIN_BID=$(echo "$PRICE_RESP" | jq -r '.data.gpuTypes[0].lowestPrice.minimumBidPrice // empty')
            STOCK=$(echo "$PRICE_RESP" | jq -r '.data.gpuTypes[0].lowestPrice.stockStatus // "Unknown"')

            if [ -z "$MIN_BID" ] || [ "$MIN_BID" = "null" ]; then
              echo "::error::No spot pricing available for $GPU_ID in secure cloud right now. Stock status: $STOCK"
              exit 1
            fi
            if [ "$STOCK" = "None" ] || [ "$STOCK" = "Low" ]; then
              echo "::error::Spot 5090 stock status is '$STOCK' — aborting rather than risk an unfillable bid"
              exit 1
            fi

            # Bid = min bid + headroom (ensures we clear the floor without overpaying)
            BID=$(jq -nr --argjson a "$MIN_BID" --argjson b "$BID_HEADROOM" '($a + $b) | . * 100 | round / 100')
            echo "Spot discovery: minimumBidPrice=\$${MIN_BID}/hr, stock=$STOCK, our bid=\$${BID}/hr"

            # ── Rent interruptable (spot) pod ──
            RENT_RESP=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d "{
                \"query\": \"mutation { podRentInterruptable(input: { name: \\\"${POD_NAME}\\\", imageName: \\\"${IMAGE}\\\", gpuTypeId: \\\"${GPU_ID}\\\", gpuCount: 1, bidPerGpu: ${BID}, cloudType: SECURE, volumeInGb: 0, containerDiskInGb: 40, minMemoryInGb: 16, minVcpuCount: 4, ports: \\\"${PORTS}\\\", startSsh: true }) { id desiredStatus costPerHr } }\"
              }" || true)

            POD_ID=$(echo "$RENT_RESP" | jq -r '.data.podRentInterruptable.id // empty')
            COST=$(echo "$RENT_RESP" | jq -r '.data.podRentInterruptable.costPerHr // empty')

            if [ -z "$POD_ID" ]; then
              ERR=$(echo "$RENT_RESP" | jq -r '.errors[0].message // "unknown error"')
              echo "::error::Failed to rent spot 5090: $ERR"
              echo "Response: $(echo "$RENT_RESP" | jq -c .)"
              exit 1
            fi
            echo "✓ Rented spot pod $POD_ID @ \$${COST}/hr"
          fi

          # ── Wait for pod to boot and get SSH info ──
          echo ""
          echo "Waiting for pod $POD_ID to boot..."
          SSH_IP=""
          SSH_PORT=""
          POD_READY=false
          for i in $(seq 1 60); do
            POD_INFO=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"query\": \"query { pod(input: {podId: \\\"${POD_ID}\\\"}) { id desiredStatus machine { dataCenterId } runtime { uptimeInSeconds ports { ip isIpPublic privatePort publicPort type } } } }\"}")

            UPTIME=$(echo "$POD_INFO" | jq -r '.data.pod.runtime.uptimeInSeconds // 0')
            if [ "$UPTIME" -gt 5 ] 2>/dev/null; then
              DC=$(echo "$POD_INFO" | jq -r '.data.pod.machine.dataCenterId // "unknown"')
              echo "Pod is running (uptime: ${UPTIME}s, datacenter: $DC)"
              SSH_IP=$(echo "$POD_INFO" | jq -r '.data.pod.runtime.ports[] | select(.privatePort == 22) | .ip')
              SSH_PORT=$(echo "$POD_INFO" | jq -r '.data.pod.runtime.ports[] | select(.privatePort == 22) | .publicPort')

              if [ -n "$SSH_IP" ] && [ "$SSH_IP" != "null" ]; then
                echo "SSH: $SSH_IP:$SSH_PORT"
                POD_READY=true
                break
              fi
            fi
            echo "  Waiting... (${i}/60)"
            sleep 5
          done

          if [ "$POD_READY" != "true" ]; then
            echo "::error::Pod $POD_ID never got SSH info after 5 minutes"
            exit 1
          fi

          echo "pod_id=$POD_ID" >> "$GITHUB_OUTPUT"
          echo "ssh_ip=$SSH_IP" >> "$GITHUB_OUTPUT"
          echo "ssh_port=$SSH_PORT" >> "$GITHUB_OUTPUT"
          echo "flux_url=wss://${POD_ID}-8766.proxy.runpod.net/ws" >> "$GITHUB_OUTPUT"
          echo "health_url=https://${POD_ID}-8766.proxy.runpod.net/health" >> "$GITHUB_OUTPUT"

      - name: Set up FLUX.2-klein via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RUNPOD_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          SSH_IP="${{ steps.find_pod.outputs.ssh_ip }}"
          SSH_PORT="${{ steps.find_pod.outputs.ssh_port }}"

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/runpod_key
          chmod 600 ~/.ssh/runpod_key

          SSH_CMD="ssh -i ~/.ssh/runpod_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -p $SSH_PORT root@$SSH_IP"
          SCP_CMD="scp -i ~/.ssh/runpod_key -o StrictHostKeyChecking=no -P $SSH_PORT"

          echo "Waiting for SSH..."
          SSH_CONNECTED=false
          for i in $(seq 1 12); do
            if $SSH_CMD "echo ok" 2>/dev/null; then
              echo "SSH connected!"
              SSH_CONNECTED=true
              break
            fi
            echo "  SSH attempt ${i}/12..."
            sleep 5
          done

          if [ "$SSH_CONNECTED" != "true" ]; then
            echo "::error::Failed to connect via SSH after 1 minute"
            exit 1
          fi

          # Copy setup script
          $SCP_CMD scripts/setup-flux-klein.sh root@"$SSH_IP":/tmp/setup-flux-klein.sh

          # Copy server files
          $SSH_CMD "rm -rf /tmp/flux-klein-server && mkdir -p /tmp/flux-klein-server"
          $SCP_CMD flux-klein-server/server.py root@"$SSH_IP":/tmp/flux-klein-server/
          $SCP_CMD flux-klein-server/pipeline.py root@"$SSH_IP":/tmp/flux-klein-server/
          $SCP_CMD flux-klein-server/config.py root@"$SSH_IP":/tmp/flux-klein-server/
          $SCP_CMD flux-klein-server/requirements.txt root@"$SSH_IP":/tmp/flux-klein-server/

          # Run setup (long — model download + warmup)
          $SSH_CMD "chmod +x /tmp/setup-flux-klein.sh && /tmp/setup-flux-klein.sh"

      - name: Wait for FLUX.2-klein readiness via proxy
        run: |
          HEALTH_URL="${{ steps.find_pod.outputs.health_url }}"
          echo "Polling $HEALTH_URL ..."
          # Model load + warmup can take up to 10 min on first deploy
          for i in $(seq 1 60); do
            RESP=$(curl -s --max-time 10 "$HEALTH_URL" 2>/dev/null || echo "")
            STATUS=$(echo "$RESP" | jq -r '.status // empty' 2>/dev/null || echo "")
            if [ "$STATUS" = "ok" ]; then
              echo "FLUX.2-klein is live via proxy!"
              echo "$RESP" | jq .
              break
            fi
            echo "  Attempt ${i}/60 (status: ${STATUS:-unreachable})"
            sleep 10
          done

      - name: Update Railway FLUX_KLEIN_URL
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          PROJECT_ID="c651eed9-55bb-464b-98f3-6d8369565740"
          ENVIRONMENT_ID="4d26f403-75b1-4177-a198-282cccc311b4"
          SERVICE_ID="bbf5c42d-7020-41a1-924b-a9c24ac49a88"
          FLUX_URL="${{ steps.find_pod.outputs.flux_url }}"

          RESPONSE=$(curl -sf "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation { variableUpsert(input: { projectId: \\\"${PROJECT_ID}\\\", environmentId: \\\"${ENVIRONMENT_ID}\\\", serviceId: \\\"${SERVICE_ID}\\\", name: \\\"FLUX_KLEIN_URL\\\", value: \\\"${FLUX_URL}\\\" }) }\"
            }")
          echo "Railway FLUX_KLEIN_URL updated to $FLUX_URL"

          # Redeploy so it picks up the new env var
          REDEPLOY=$(curl -sf "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation { serviceInstanceRedeploy(environmentId: \\\"${ENVIRONMENT_ID}\\\", serviceId: \\\"${SERVICE_ID}\\\") }\"
            }")
          echo "Railway service redeployed"

      - name: Summary
        if: always()
        run: |
          POD_ID="${{ steps.find_pod.outputs.pod_id }}"
          FLUX_URL="${{ steps.find_pod.outputs.flux_url }}"
          HEALTH_URL="${{ steps.find_pod.outputs.health_url }}"

          echo "## FLUX.2-klein Deployed (RTX 5090 Spot)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Pod ID** | \`$POD_ID\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **WebSocket URL** | \`$FLUX_URL\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Health Check** | $HEALTH_URL |" >> "$GITHUB_STEP_SUMMARY"

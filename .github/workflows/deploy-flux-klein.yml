name: Deploy FLUX.2-klein

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find or create pod
        id: find_pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          set -euo pipefail
          API_URL="https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}"
          POD_NAME="kiki-flux-klein"
          # FLUX.2-klein needs ~13GB VRAM — wider GPU range than ComfyUI's ~25GB
          GPU_TYPES=("NVIDIA H100 80GB HBM3" "NVIDIA H100 NVL" "NVIDIA H100 PCIe" "NVIDIA L40S" "NVIDIA GeForce RTX 4090" "NVIDIA A100 80GB PCIe")
          IMAGE="runpod/pytorch:2.4.0-py3.11-cuda12.4.1-devel-ubuntu22.04"
          PORTS="8766/http,22/tcp"
          MAX_VOLUMES=10

          # ── Check for existing running pod ──
          echo "Looking for running $POD_NAME pod..."
          PODS=$(curl -sf "$API_URL" \
            -H 'Content-Type: application/json' \
            -d '{"query": "query { myself { pods { id name desiredStatus runtime { uptimeInSeconds ports { ip isIpPublic privatePort publicPort type } } } } }"}')

          POD_ID=$(echo "$PODS" | jq -r "
            .data.myself.pods[]
            | select(.name == \"$POD_NAME\" and .desiredStatus == \"RUNNING\")
            | .id" | head -1)

          if [ -n "$POD_ID" ] && [ "$POD_ID" != "null" ]; then
            echo "Found existing pod: $POD_ID"
          else
            echo "No running $POD_NAME pod. Creating one..."

            # ── Discover network volumes ──
            VOLUMES=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d '{"query": "query { myself { networkVolumes { id name dataCenterId size } } }"}')
            VOLUME_COUNT=$(echo "$VOLUMES" | jq '.data.myself.networkVolumes | length')
            EXISTING_DCS=$(echo "$VOLUMES" | jq -r '.data.myself.networkVolumes[] | .dataCenterId' | sort -u)

            # Helper: try creating a pod in a datacenter with a volume
            try_create_pod() {
              local gpu="$1" dc="$2" vol="$3"
              echo "  Trying $gpu on-demand in $dc..."
              local resp
              resp=$(curl -sf "$API_URL" \
                -H 'Content-Type: application/json' \
                -d "{
                  \"query\": \"mutation { podFindAndDeployOnDemand(input: { name: \\\"${POD_NAME}\\\", imageName: \\\"${IMAGE}\\\", gpuTypeId: \\\"${gpu}\\\", gpuCount: 1, volumeInGb: 0, containerDiskInGb: 20, networkVolumeId: \\\"${vol}\\\", volumeMountPath: \\\"/workspace\\\", ports: \\\"${PORTS}\\\", dataCenterId: \\\"${dc}\\\", startSsh: true }) { id } }\"
                }" || true)

              POD_ID=$(echo "$resp" | jq -r '.data.podFindAndDeployOnDemand.id // empty')
              if [ -n "$POD_ID" ]; then
                echo "  ✓ Pod $POD_ID with $gpu in $dc"
                return 0
              fi
              local err
              err=$(echo "$resp" | jq -r '.errors[0].message // empty' 2>/dev/null)
              echo "  Failed: ${err:-unknown}"
              return 1
            }

            # Phase 1: Try existing volume datacenters
            # GPU-first loop: prefer the best GPU across all DCs before falling back
            POD_ID=""
            if [ -n "$EXISTING_DCS" ]; then
              echo "Trying existing datacenters: $EXISTING_DCS"
              for GPU in "${GPU_TYPES[@]}"; do
                for DC in $EXISTING_DCS; do
                  VOL_ID=$(echo "$VOLUMES" | jq -r ".data.myself.networkVolumes[] | select(.dataCenterId == \"$DC\") | .id" | head -1)
                  if try_create_pod "$GPU" "$DC" "$VOL_ID"; then
                    break 2
                  fi
                done
              done
            fi

            # Phase 2: Discover new datacenters if needed
            if [ -z "$POD_ID" ]; then
              echo ""
              echo "No GPU available in existing DCs. Discovering new datacenters..."

              if [ "$VOLUME_COUNT" -ge "$MAX_VOLUMES" ]; then
                echo "::error::Cannot create new volume — at $VOLUME_COUNT/$MAX_VOLUMES limit"
                exit 1
              fi

              ALL_DCS=$(curl -sf "$API_URL" \
                -H 'Content-Type: application/json' \
                -d '{"query": "query { dataCenters { id name location } }"}' \
                | jq -r '.data.dataCenters[].id')

              for DC in $ALL_DCS; do
                # Skip DCs we already tried
                echo "$EXISTING_DCS" | grep -qw "$DC" && continue

                echo "Trying new DC: $DC"

                # Create a volume here
                DC_LOWER="${DC,,}"
                VOL_RESP=$(curl -sf "$API_URL" \
                  -H 'Content-Type: application/json' \
                  -d "{
                    \"query\": \"mutation { createNetworkVolume(input: { name: \\\"kiki-${DC_LOWER}\\\", size: 100, dataCenterId: \\\"${DC}\\\" }) { id } }\"
                  }" || true)
                VOL_ID=$(echo "$VOL_RESP" | jq -r '.data.createNetworkVolume.id // empty')
                if [ -z "$VOL_ID" ]; then
                  echo "  Could not create volume in $DC"
                  continue
                fi
                echo "  Created volume $VOL_ID in $DC"

                for GPU in "${GPU_TYPES[@]}"; do
                  if try_create_pod "$GPU" "$DC" "$VOL_ID"; then
                    break 2
                  fi
                done
              done
            fi

            if [ -z "$POD_ID" ]; then
              echo "::error::Could not create pod with any GPU in any datacenter"
              exit 1
            fi
          fi

          # ── Wait for pod to boot and get SSH info ──
          # Check uptimeInSeconds first — runtime and ports are null while booting
          echo ""
          echo "Waiting for pod $POD_ID to boot..."
          SSH_IP=""
          SSH_PORT=""
          POD_READY=false
          for i in $(seq 1 60); do
            POD_INFO=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"query\": \"query { pod(input: {podId: \\\"${POD_ID}\\\"}) { id desiredStatus runtime { uptimeInSeconds ports { ip isIpPublic privatePort publicPort type } } } }\"}")

            UPTIME=$(echo "$POD_INFO" | jq -r '.data.pod.runtime.uptimeInSeconds // 0')
            if [ "$UPTIME" -gt 5 ] 2>/dev/null; then
              echo "Pod is running (uptime: ${UPTIME}s)"
              SSH_IP=$(echo "$POD_INFO" | jq -r '.data.pod.runtime.ports[] | select(.privatePort == 22) | .ip')
              SSH_PORT=$(echo "$POD_INFO" | jq -r '.data.pod.runtime.ports[] | select(.privatePort == 22) | .publicPort')

              if [ -n "$SSH_IP" ] && [ "$SSH_IP" != "null" ]; then
                echo "SSH: $SSH_IP:$SSH_PORT"
                POD_READY=true
                break
              fi
            fi
            echo "  Waiting... (${i}/60)"
            sleep 5
          done

          if [ "$POD_READY" != "true" ]; then
            echo "::error::Pod $POD_ID never got SSH info after 5 minutes"
            exit 1
          fi

          echo "pod_id=$POD_ID" >> "$GITHUB_OUTPUT"
          echo "ssh_ip=$SSH_IP" >> "$GITHUB_OUTPUT"
          echo "ssh_port=$SSH_PORT" >> "$GITHUB_OUTPUT"
          echo "flux_url=wss://${POD_ID}-8766.proxy.runpod.net/ws" >> "$GITHUB_OUTPUT"
          echo "health_url=https://${POD_ID}-8766.proxy.runpod.net/health" >> "$GITHUB_OUTPUT"

      - name: Set up FLUX.2-klein via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RUNPOD_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          SSH_IP="${{ steps.find_pod.outputs.ssh_ip }}"
          SSH_PORT="${{ steps.find_pod.outputs.ssh_port }}"

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/runpod_key
          chmod 600 ~/.ssh/runpod_key

          SSH_CMD="ssh -i ~/.ssh/runpod_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -p $SSH_PORT root@$SSH_IP"
          SCP_CMD="scp -i ~/.ssh/runpod_key -o StrictHostKeyChecking=no -P $SSH_PORT"

          echo "Waiting for SSH..."
          SSH_CONNECTED=false
          for i in $(seq 1 12); do
            if $SSH_CMD "echo ok" 2>/dev/null; then
              echo "SSH connected!"
              SSH_CONNECTED=true
              break
            fi
            echo "  SSH attempt ${i}/12..."
            sleep 5
          done

          if [ "$SSH_CONNECTED" != "true" ]; then
            echo "::error::Failed to connect via SSH after 1 minute"
            exit 1
          fi

          # Copy setup script
          $SCP_CMD scripts/setup-flux-klein.sh root@"$SSH_IP":/tmp/setup-flux-klein.sh

          # Copy server files
          $SSH_CMD "rm -rf /tmp/flux-klein-server && mkdir -p /tmp/flux-klein-server"
          $SCP_CMD flux-klein-server/server.py root@"$SSH_IP":/tmp/flux-klein-server/
          $SCP_CMD flux-klein-server/pipeline.py root@"$SSH_IP":/tmp/flux-klein-server/
          $SCP_CMD flux-klein-server/config.py root@"$SSH_IP":/tmp/flux-klein-server/
          $SCP_CMD flux-klein-server/requirements.txt root@"$SSH_IP":/tmp/flux-klein-server/

          # Run setup (long — model download + warmup)
          $SSH_CMD "chmod +x /tmp/setup-flux-klein.sh && /tmp/setup-flux-klein.sh"

      - name: Wait for FLUX.2-klein readiness via proxy
        run: |
          HEALTH_URL="${{ steps.find_pod.outputs.health_url }}"
          echo "Polling $HEALTH_URL ..."
          # Model load + warmup can take up to 10 min on first deploy
          for i in $(seq 1 60); do
            RESP=$(curl -s --max-time 10 "$HEALTH_URL" 2>/dev/null || echo "")
            STATUS=$(echo "$RESP" | jq -r '.status // empty' 2>/dev/null || echo "")
            if [ "$STATUS" = "ok" ]; then
              echo "FLUX.2-klein is live via proxy!"
              echo "$RESP" | jq .
              break
            fi
            echo "  Attempt ${i}/60 (status: ${STATUS:-unreachable})"
            sleep 10
          done

      - name: Update Railway FLUX_KLEIN_URL
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          PROJECT_ID="c651eed9-55bb-464b-98f3-6d8369565740"
          ENVIRONMENT_ID="4d26f403-75b1-4177-a198-282cccc311b4"
          SERVICE_ID="bbf5c42d-7020-41a1-924b-a9c24ac49a88"
          FLUX_URL="${{ steps.find_pod.outputs.flux_url }}"

          RESPONSE=$(curl -sf "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation { variableUpsert(input: { projectId: \\\"${PROJECT_ID}\\\", environmentId: \\\"${ENVIRONMENT_ID}\\\", serviceId: \\\"${SERVICE_ID}\\\", name: \\\"FLUX_KLEIN_URL\\\", value: \\\"${FLUX_URL}\\\" }) }\"
            }")
          echo "Railway FLUX_KLEIN_URL updated to $FLUX_URL"

          # Redeploy so it picks up the new env var
          REDEPLOY=$(curl -sf "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation { serviceInstanceRedeploy(environmentId: \\\"${ENVIRONMENT_ID}\\\", serviceId: \\\"${SERVICE_ID}\\\") }\"
            }")
          echo "Railway service redeployed"

      - name: Summary
        if: always()
        run: |
          POD_ID="${{ steps.find_pod.outputs.pod_id }}"
          FLUX_URL="${{ steps.find_pod.outputs.flux_url }}"
          HEALTH_URL="${{ steps.find_pod.outputs.health_url }}"

          echo "## FLUX.2-klein Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Pod ID** | \`$POD_ID\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **WebSocket URL** | \`$FLUX_URL\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Health Check** | $HEALTH_URL |" >> "$GITHUB_STEP_SUMMARY"

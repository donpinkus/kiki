name: Build FLUX.2-klein image

on:
  push:
    branches: [main]
    paths:
      - 'flux-klein-server/**'
      - '.github/workflows/build-flux-image.yml'
  workflow_dispatch:

concurrency:
  group: build-flux-image
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./flux-klein-server
          file: ./flux-klein-server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kiki-flux-klein:latest
            ghcr.io/${{ github.repository_owner }}/kiki-flux-klein:sha-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/kiki-flux-klein:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/kiki-flux-klein:buildcache,mode=max

      - name: Report pushed tags
        run: |
          echo "Pushed:"
          echo "  ghcr.io/${{ github.repository_owner }}/kiki-flux-klein:latest"
          echo "  ghcr.io/${{ github.repository_owner }}/kiki-flux-klein:sha-${{ github.sha }}"

name: Deploy RunPod

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find or create pod
        id: create
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          set -euo pipefail
          API_URL="https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}"
          GPU_TYPES=("NVIDIA H100 80GB HBM3" "NVIDIA H100 PCIe")
          MAX_VOLUMES=10
          MAX_BID="3.50"

          # Fallback bid prices per GPU (used if minimumBidPrice query fails)
          declare -A FALLBACK_BIDS=(
            ["NVIDIA H100 80GB HBM3"]="2.49"
            ["NVIDIA H100 PCIe"]="1.79"
          )

          # ── Helper: get bid price for a GPU type ──
          get_bid_price() {
            local gpu="$1"
            local min_bid
            min_bid=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"query\": \"query { gpuTypes(input: {id: \\\"${gpu}\\\"}) { lowestPrice(input: {gpuCount: 1, secureCloud: false}) { minimumBidPrice } } }\"}" \
              | jq -r '.data.gpuTypes[0].lowestPrice.minimumBidPrice // empty' 2>/dev/null)

            if [ -n "$min_bid" ] && [ "$min_bid" != "null" ]; then
              # Add 10% buffer above minimum bid
              local bid
              bid=$(echo "$min_bid * 1.1" | bc -l | xargs printf '%.2f')
              # Cap at MAX_BID
              if (( $(echo "$bid > $MAX_BID" | bc -l) )); then
                echo "$MAX_BID"
              else
                echo "$bid"
              fi
            else
              # Use fallback
              echo "${FALLBACK_BIDS[$gpu]:-$MAX_BID}"
            fi
          }

          # ── Phase 1: Discover existing network volumes ──
          echo "::group::Finding network volumes"
          VOLUMES=$(curl -sf "$API_URL" \
            -H 'Content-Type: application/json' \
            -d '{"query": "query { myself { networkVolumes { id name dataCenterId size } } }"}')
          echo "$VOLUMES" | jq '.data.myself.networkVolumes'
          VOLUME_COUNT=$(echo "$VOLUMES" | jq '.data.myself.networkVolumes | length')
          echo "Found $VOLUME_COUNT volume(s)"
          echo "::endgroup::"

          EXISTING_DCS=$(echo "$VOLUMES" | jq -r '.data.myself.networkVolumes[] | .dataCenterId' | sort -u)
          POD_ID=""
          USED_DC=""
          NEW_VOLUME_CREATED=false

          # ── Phase 2: Try existing volumes (spot instances) ──
          if [ -n "$EXISTING_DCS" ]; then
            echo "::group::Trying existing datacenters (spot)"
            for DATACENTER in $EXISTING_DCS; do
              VOLUME_ID=$(echo "$VOLUMES" | jq -r ".data.myself.networkVolumes[] | select(.dataCenterId == \"$DATACENTER\") | .id" | head -1)
              echo "Trying $DATACENTER (volume: $VOLUME_ID)..."

              for GPU in "${GPU_TYPES[@]}"; do
                BID_PRICE=$(get_bid_price "$GPU")
                echo "  Trying $GPU (bid: \$$BID_PRICE/hr)..."
                RESPONSE=$(curl -sf "$API_URL" \
                  -H 'Content-Type: application/json' \
                  -d "{
                    \"query\": \"mutation { podRentInterruptable(input: { name: \\\"kiki-comfyui\\\", imageName: \\\"runpod/comfyui:latest\\\", gpuTypeId: \\\"${GPU}\\\", gpuCount: 1, cloudType: COMMUNITY, bidPerGpu: ${BID_PRICE}, volumeInGb: 0, containerDiskInGb: 20, networkVolumeId: \\\"${VOLUME_ID}\\\", volumeMountPath: \\\"/workspace\\\", ports: \\\"8188/http,22/tcp\\\", dataCenterId: \\\"${DATACENTER}\\\", startSsh: true }) { id } }\"
                  }" || true)

                POD_ID=$(echo "$RESPONSE" | jq -r '.data.podRentInterruptable.id // empty')
                if [ -n "$POD_ID" ]; then
                  echo "✓ Created spot pod $POD_ID with $GPU in $DATACENTER (bid: \$$BID_PRICE/hr, existing volume)"
                  USED_DC="$DATACENTER"
                  break 2
                fi
              done
              echo "  No GPU available in $DATACENTER"
            done
            echo "::endgroup::"
          fi

          # ── Phase 3: No existing DC worked — dynamically discover new ones ──
          if [ -z "$POD_ID" ]; then
            echo ""
            echo "⚠️  No GPU available in existing datacenters ($EXISTING_DCS)"
            echo ""

            if [ "$VOLUME_COUNT" -ge "$MAX_VOLUMES" ]; then
              echo "::error::Cannot create new volume — already at $VOLUME_COUNT/$MAX_VOLUMES limit"
              exit 1
            fi

            echo "::group::Querying all datacenters for GPU availability"

            # Query ALL RunPod datacenters with GPU availability (no hardcoded DC list)
            DC_AVAIL=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d '{
                "operationName": "getAllDatacenters",
                "query": "query getAllDatacenters($input: GpuAvailabilityInput) { dataCenters { id name storageSupport gpuAvailability(input: $input) { stockStatus gpuTypeId gpuTypeDisplayName } } }",
                "variables": { "input": { "gpuCount": 1, "secureCloud": false } }
              }')

            # Validate we got data back (API schema might change)
            DC_COUNT=$(echo "$DC_AVAIL" | jq '.data.dataCenters | length // 0' 2>/dev/null)
            if [ -z "$DC_COUNT" ] || [ "$DC_COUNT" = "0" ] || [ "$DC_COUNT" = "null" ]; then
              echo "::warning::dataCenters query returned no results — API schema may have changed"
              echo "Response: $(echo "$DC_AVAIL" | jq -c . 2>/dev/null || echo "$DC_AVAIL")"
              echo "::error::No GPU available (dynamic datacenter discovery failed)"
              exit 1
            fi

            # Log available DCs with GPUs for debugging
            echo "Found $DC_COUNT datacenters. DCs with GPU availability:"
            echo "$DC_AVAIL" | jq '[.data.dataCenters[]
              | select(.gpuAvailability | length > 0)
              | {id, name, storage: .storageSupport, gpus: [.gpuAvailability[] | {type: .gpuTypeId, stock: .stockStatus}]}]'

            FOUND_DC=""
            FOUND_GPU=""

            # Iterate GPU types in preference order (H100 SXM first)
            for GPU in "${GPU_TYPES[@]}"; do
              if [ -n "$FOUND_DC" ]; then break; fi

              # Get ALL DCs that have this GPU with valid stock and storage support
              AVAILABLE_DCS=$(echo "$DC_AVAIL" | jq -r --arg gpu "$GPU" '
                [.data.dataCenters[]
                 | select(.storageSupport == true or .storageSupport == "true")
                 | select(any(.gpuAvailability[];
                     .gpuTypeId == $gpu
                     and (.stockStatus == "High" or .stockStatus == "Low" or .stockStatus == "Medium")))
                 | .id] | .[]')

              for DC in $AVAILABLE_DCS; do
                # Skip DCs we already have volumes in (already tried in Phase 2)
                SKIP=false
                for EXISTING in $EXISTING_DCS; do
                  if [ "$DC" = "$EXISTING" ]; then
                    SKIP=true
                    break
                  fi
                done

                if [ "$SKIP" = "false" ]; then
                  FOUND_DC="$DC"
                  FOUND_GPU="$GPU"
                  echo "✓ Found $GPU available in $FOUND_DC"
                  break
                fi
              done
            done
            echo "::endgroup::"

            if [ -z "$FOUND_DC" ]; then
              echo "::error::No GPU available in any datacenter (checked $DC_COUNT RunPod datacenters dynamically)"
              exit 1
            fi

            # ── Phase 4: Create new volume in the available datacenter ──
            echo ""
            echo "📦 Creating new network volume in $FOUND_DC..."
            echo "   (This will incur ~\$2/month storage cost)"
            echo "   Total volumes after creation: $((VOLUME_COUNT + 1)) of $MAX_VOLUMES max"

            VOL_RESP=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d "{
                \"query\": \"mutation { createNetworkVolume(input: { name: \\\"kiki-${FOUND_DC,,}\\\", dataCenterId: \\\"${FOUND_DC}\\\", size: 30 }) { id name dataCenterId } }\"
              }")

            VOLUME_ID=$(echo "$VOL_RESP" | jq -r '.data.createNetworkVolume.id // empty')
            if [ -z "$VOLUME_ID" ]; then
              echo "::error::Failed to create network volume in $FOUND_DC"
              echo "$VOL_RESP" | jq .
              exit 1
            fi
            echo "✓ Created volume $VOLUME_ID in $FOUND_DC"
            NEW_VOLUME_CREATED=true

            # Small delay for volume to be ready
            sleep 5

            # ── Phase 5: Create pod with the new volume (spot) ──
            BID_PRICE=$(get_bid_price "$FOUND_GPU")
            echo "Creating spot pod with $FOUND_GPU in $FOUND_DC (bid: \$$BID_PRICE/hr)..."
            RESPONSE=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d "{
                \"query\": \"mutation { podRentInterruptable(input: { name: \\\"kiki-comfyui\\\", imageName: \\\"runpod/comfyui:latest\\\", gpuTypeId: \\\"${FOUND_GPU}\\\", gpuCount: 1, cloudType: COMMUNITY, bidPerGpu: ${BID_PRICE}, volumeInGb: 0, containerDiskInGb: 20, networkVolumeId: \\\"${VOLUME_ID}\\\", volumeMountPath: \\\"/workspace\\\", ports: \\\"8188/http,22/tcp\\\", dataCenterId: \\\"${FOUND_DC}\\\", startSsh: true }) { id } }\"
              }" || true)

            POD_ID=$(echo "$RESPONSE" | jq -r '.data.podRentInterruptable.id // empty')
            USED_DC="$FOUND_DC"

            if [ -z "$POD_ID" ]; then
              echo "::error::GPU became unavailable in $FOUND_DC during volume creation"
              echo "Response: $(echo "$RESPONSE" | jq -c . 2>/dev/null || echo "$RESPONSE")"
              exit 1
            fi
            echo "✓ Created spot pod $POD_ID with $FOUND_GPU in $FOUND_DC (bid: \$$BID_PRICE/hr, new volume)"
          fi

          echo "pod_id=$POD_ID" >> "$GITHUB_OUTPUT"
          echo "proxy_url=https://${POD_ID}-8188.proxy.runpod.net" >> "$GITHUB_OUTPUT"
          echo "datacenter=$USED_DC" >> "$GITHUB_OUTPUT"
          echo "new_volume=$NEW_VOLUME_CREATED" >> "$GITHUB_OUTPUT"

      - name: Wait for pod to boot and get SSH info
        id: ssh_info
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          set -euo pipefail
          POD_ID="${{ steps.create.outputs.pod_id }}"
          API_URL="https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}"

          echo "Waiting for pod to start..."
          POD_READY=false
          for i in $(seq 1 60); do
            STATUS=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"query\": \"query { pod(input: { podId: \\\"${POD_ID}\\\" }) { runtime { uptimeInSeconds ports { ip isIpPublic privatePort publicPort type } } } }\"}")

            UPTIME=$(echo "$STATUS" | jq -r '.data.pod.runtime.uptimeInSeconds // 0')
            if [ "$UPTIME" -gt 5 ] 2>/dev/null; then
              echo "Pod is running (uptime: ${UPTIME}s)"
              SSH_IP=$(echo "$STATUS" | jq -r '.data.pod.runtime.ports[] | select(.privatePort == 22) | .ip')
              SSH_PORT=$(echo "$STATUS" | jq -r '.data.pod.runtime.ports[] | select(.privatePort == 22) | .publicPort')

              if [ -n "$SSH_IP" ] && [ "$SSH_IP" != "null" ]; then
                echo "SSH: $SSH_IP:$SSH_PORT"
                echo "ssh_ip=$SSH_IP" >> "$GITHUB_OUTPUT"
                echo "ssh_port=$SSH_PORT" >> "$GITHUB_OUTPUT"
                POD_READY=true
                break
              fi
            fi
            echo "  Waiting... (${i}/60)"
            sleep 5
          done

          if [ "$POD_READY" != "true" ]; then
            echo "::error::Pod failed to start within 5 minutes"
            exit 1
          fi

      - name: Set up models and custom nodes via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RUNPOD_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          SSH_IP="${{ steps.ssh_info.outputs.ssh_ip }}"
          SSH_PORT="${{ steps.ssh_info.outputs.ssh_port }}"

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/runpod_key
          chmod 600 ~/.ssh/runpod_key

          SSH_CMD="ssh -i ~/.ssh/runpod_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 -p $SSH_PORT root@$SSH_IP"

          echo "Waiting for SSH..."
          SSH_CONNECTED=false
          for i in $(seq 1 12); do
            if $SSH_CMD "echo ok" 2>/dev/null; then
              echo "SSH connected!"
              SSH_CONNECTED=true
              break
            fi
            echo "  SSH attempt ${i}/12..."
            sleep 5
          done

          if [ "$SSH_CONNECTED" != "true" ]; then
            echo "::error::Failed to connect via SSH after 1 minute"
            exit 1
          fi

          scp -i ~/.ssh/runpod_key -o StrictHostKeyChecking=no -P "$SSH_PORT" \
            scripts/setup-pod.sh root@"$SSH_IP":/tmp/setup-pod.sh

          $SSH_CMD "chmod +x /tmp/setup-pod.sh && /tmp/setup-pod.sh"

      - name: Wait for ComfyUI with models loaded
        run: |
          PROXY_URL="${{ steps.create.outputs.proxy_url }}"
          echo "Polling $PROXY_URL/system_stats ..."
          for i in $(seq 1 60); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${PROXY_URL}/system_stats" 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "ComfyUI is live!"
              curl -s "${PROXY_URL}/system_stats" | jq .
              break
            fi
            echo "  Attempt ${i}/60 (HTTP $CODE)"
            sleep 10
          done

      - name: Update Railway COMFYUI_URL
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          PROJECT_ID="c651eed9-55bb-464b-98f3-6d8369565740"
          ENVIRONMENT_ID="4d26f403-75b1-4177-a198-282cccc311b4"
          SERVICE_ID="bbf5c42d-7020-41a1-924b-a9c24ac49a88"
          COMFYUI_URL="${{ steps.create.outputs.proxy_url }}"

          RESPONSE=$(curl -sf "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation { variableUpsert(input: { projectId: \\\"${PROJECT_ID}\\\", environmentId: \\\"${ENVIRONMENT_ID}\\\", serviceId: \\\"${SERVICE_ID}\\\", name: \\\"COMFYUI_URL\\\", value: \\\"${COMFYUI_URL}\\\" }) }\"
            }")
          echo "Railway COMFYUI_URL updated to $COMFYUI_URL"

      - name: Summary
        if: always()
        run: |
          POD_ID="${{ steps.create.outputs.pod_id }}"
          PROXY_URL="${{ steps.create.outputs.proxy_url }}"
          DATACENTER="${{ steps.create.outputs.datacenter }}"
          NEW_VOL="${{ steps.create.outputs.new_volume }}"

          echo "## Spot Pod Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Pod ID** | \`$POD_ID\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Datacenter** | $DATACENTER |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **ComfyUI URL** | $PROXY_URL |" >> "$GITHUB_STEP_SUMMARY"
          if [ "$NEW_VOL" = "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> **Note:** A new network volume was created in $DATACENTER because no GPU was available in existing datacenters. This adds ~\$2/month storage cost." >> "$GITHUB_STEP_SUMMARY"
          fi

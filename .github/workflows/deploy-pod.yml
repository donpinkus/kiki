name: Deploy RunPod

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create RunPod pod
        id: create
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          set -euo pipefail
          API_URL="https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}"

          # Get all network volumes
          echo "::group::Finding network volumes"
          VOLUMES=$(curl -sf "$API_URL" \
            -H 'Content-Type: application/json' \
            -d '{"query": "query { myself { networkVolumes { id name dataCenterId size } } }"}')
          echo "$VOLUMES" | jq '.data.myself.networkVolumes'
          echo "::endgroup::"

          # Try each datacenter that has a network volume, in order of preference
          DATACENTERS=$(echo "$VOLUMES" | jq -r '.data.myself.networkVolumes[] | .dataCenterId' | sort -u)

          if [ -z "$DATACENTERS" ]; then
            echo "::error::No network volumes found"
            exit 1
          fi

          GPU_TYPES=("NVIDIA H100 80GB HBM3" "NVIDIA H100 PCIe" "NVIDIA A100 80GB PCIe")
          POD_ID=""

          for DATACENTER in $DATACENTERS; do
            VOLUME_ID=$(echo "$VOLUMES" | jq -r ".data.myself.networkVolumes[] | select(.dataCenterId == \"$DATACENTER\") | .id" | head -1)
            echo "Trying datacenter $DATACENTER (volume: $VOLUME_ID)..."

            for GPU in "${GPU_TYPES[@]}"; do
              echo "::group::Trying $GPU in $DATACENTER"
              RESPONSE=$(curl -sf "$API_URL" \
                -H 'Content-Type: application/json' \
                -d "{
                  \"query\": \"mutation { podFindAndDeployOnDemand(input: { name: \\\"kiki-comfyui\\\", imageName: \\\"runpod/comfyui:latest\\\", gpuTypeId: \\\"${GPU}\\\", gpuCount: 1, volumeInGb: 0, containerDiskInGb: 20, networkVolumeId: \\\"${VOLUME_ID}\\\", ports: \\\"8188/http,22/tcp\\\", dataCenterId: \\\"${DATACENTER}\\\", startSsh: true }) { id machineId imageName desiredStatus } }\"
                }" || true)

              POD_ID=$(echo "$RESPONSE" | jq -r '.data.podFindAndDeployOnDemand.id // empty')
              echo "::endgroup::"

              if [ -n "$POD_ID" ]; then
                echo "Created pod $POD_ID with $GPU in $DATACENTER"
                break 2
              fi
              echo "::warning::$GPU not available in $DATACENTER"
            done
          done

          if [ -z "$POD_ID" ]; then
            echo "::error::No GPU available in any datacenter with a network volume"
            exit 1
          fi

          echo "pod_id=$POD_ID" >> "$GITHUB_OUTPUT"
          echo "proxy_url=https://${POD_ID}-8188.proxy.runpod.net" >> "$GITHUB_OUTPUT"

      - name: Wait for pod to boot and get SSH info
        id: ssh_info
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          set -euo pipefail
          POD_ID="${{ steps.create.outputs.pod_id }}"
          API_URL="https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}"

          echo "Waiting for pod to start..."
          POD_READY=false
          for i in $(seq 1 60); do
            STATUS=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"query\": \"query { pod(input: { podId: \\\"${POD_ID}\\\" }) { runtime { uptimeInSeconds ports { ip isIpPublic privatePort publicPort type } } } }\"}")

            UPTIME=$(echo "$STATUS" | jq -r '.data.pod.runtime.uptimeInSeconds // 0')
            if [ "$UPTIME" -gt 5 ] 2>/dev/null; then
              echo "Pod is running (uptime: ${UPTIME}s)"

              # Extract SSH connection details (port 22 mapped to a public port)
              SSH_IP=$(echo "$STATUS" | jq -r '.data.pod.runtime.ports[] | select(.privatePort == 22) | .ip')
              SSH_PORT=$(echo "$STATUS" | jq -r '.data.pod.runtime.ports[] | select(.privatePort == 22) | .publicPort')

              if [ -n "$SSH_IP" ] && [ "$SSH_IP" != "null" ]; then
                echo "SSH: $SSH_IP:$SSH_PORT"
                echo "ssh_ip=$SSH_IP" >> "$GITHUB_OUTPUT"
                echo "ssh_port=$SSH_PORT" >> "$GITHUB_OUTPUT"
                POD_READY=true
                break
              fi
            fi
            echo "  Waiting... (${i}/60)"
            sleep 5
          done

          if [ "$POD_READY" != "true" ]; then
            echo "::error::Pod failed to start within 5 minutes"
            exit 1
          fi

      - name: Set up models and custom nodes via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RUNPOD_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          SSH_IP="${{ steps.ssh_info.outputs.ssh_ip }}"
          SSH_PORT="${{ steps.ssh_info.outputs.ssh_port }}"

          # Write SSH key
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/runpod_key
          chmod 600 ~/.ssh/runpod_key

          SSH_CMD="ssh -i ~/.ssh/runpod_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 -p $SSH_PORT root@$SSH_IP"

          # Wait for SSH to be ready
          echo "Waiting for SSH..."
          SSH_CONNECTED=false
          for i in $(seq 1 12); do
            if $SSH_CMD "echo ok" 2>/dev/null; then
              echo "SSH connected!"
              SSH_CONNECTED=true
              break
            fi
            echo "  SSH attempt ${i}/12..."
            sleep 5
          done

          if [ "$SSH_CONNECTED" != "true" ]; then
            echo "::error::Failed to connect via SSH after 1 minute"
            exit 1
          fi

          # Copy and run setup script
          scp -i ~/.ssh/runpod_key -o StrictHostKeyChecking=no -P "$SSH_PORT" \
            scripts/setup-pod.sh root@"$SSH_IP":/tmp/setup-pod.sh

          $SSH_CMD "chmod +x /tmp/setup-pod.sh && /tmp/setup-pod.sh"

      - name: Wait for ComfyUI with models loaded
        run: |
          PROXY_URL="${{ steps.create.outputs.proxy_url }}"
          echo "Polling $PROXY_URL/system_stats ..."
          for i in $(seq 1 60); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${PROXY_URL}/system_stats" 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "ComfyUI is live!"
              curl -s "${PROXY_URL}/system_stats" | jq .
              break
            fi
            echo "  Attempt ${i}/60 (HTTP $CODE)"
            sleep 10
          done

      - name: Update Railway COMFYUI_URL
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Use Railway GraphQL API directly (CLI requires interactive linking)
          # These IDs are from the kiki-backend Railway project
          PROJECT_ID="c651eed9-55bb-464b-98f3-6d8369565740"
          ENVIRONMENT_ID="4d26f403-75b1-4177-a198-282cccc311b4"
          SERVICE_ID="bbf5c42d-7020-41a1-924b-a9c24ac49a88"
          COMFYUI_URL="${{ steps.create.outputs.proxy_url }}"

          RESPONSE=$(curl -sf "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation { variableUpsert(input: { projectId: \\\"${PROJECT_ID}\\\", environmentId: \\\"${ENVIRONMENT_ID}\\\", serviceId: \\\"${SERVICE_ID}\\\", name: \\\"COMFYUI_URL\\\", value: \\\"${COMFYUI_URL}\\\" }) }\"
            }")

          echo "Railway API response: $RESPONSE"
          echo "Railway COMFYUI_URL updated to $COMFYUI_URL"

      - name: Summary
        if: always()
        run: |
          POD_ID="${{ steps.create.outputs.pod_id }}"
          PROXY_URL="${{ steps.create.outputs.proxy_url }}"
          echo "## Pod Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Pod ID** | \`$POD_ID\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **ComfyUI URL** | $PROXY_URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Web UI** | $PROXY_URL |" >> "$GITHUB_STEP_SUMMARY"

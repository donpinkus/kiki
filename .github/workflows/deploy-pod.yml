name: Deploy RunPod

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find or create pod
        id: create
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          set -euo pipefail
          API_URL="https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}"
          GPU_TYPES=("NVIDIA H100 80GB HBM3" "NVIDIA H100 PCIe")
          MAX_VOLUMES=10
          MAX_BID="3.50"

          # Fallback bid prices per GPU (used if minimumBidPrice query fails)
          declare -A FALLBACK_BIDS=(
            ["NVIDIA H100 80GB HBM3"]="2.49"
            ["NVIDIA H100 PCIe"]="1.79"
          )

          # ── Helper: get bid price for a GPU type ──
          get_bid_price() {
            local gpu="$1"
            local min_bid
            min_bid=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"query\": \"query { gpuTypes(input: {id: \\\"${gpu}\\\"}) { lowestPrice(input: {gpuCount: 1, secureCloud: false}) { minimumBidPrice } } }\"}" \
              | jq -r '.data.gpuTypes[0].lowestPrice.minimumBidPrice // empty' 2>/dev/null)

            if [ -n "$min_bid" ] && [ "$min_bid" != "null" ]; then
              # Add 10% buffer above minimum bid
              local bid
              bid=$(echo "$min_bid * 1.1" | bc -l | xargs printf '%.2f')
              # Cap at MAX_BID
              if (( $(echo "$bid > $MAX_BID" | bc -l) )); then
                echo "$MAX_BID"
              else
                echo "$bid"
              fi
            else
              # Use fallback
              echo "${FALLBACK_BIDS[$gpu]:-$MAX_BID}"
            fi
          }

          # ── Phase 1: Discover existing network volumes ──
          echo "::group::Finding network volumes"
          VOLUMES=$(curl -sf "$API_URL" \
            -H 'Content-Type: application/json' \
            -d '{"query": "query { myself { networkVolumes { id name dataCenterId size } } }"}')
          echo "$VOLUMES" | jq '.data.myself.networkVolumes'
          VOLUME_COUNT=$(echo "$VOLUMES" | jq '.data.myself.networkVolumes | length')
          echo "Found $VOLUME_COUNT volume(s)"
          echo "::endgroup::"

          EXISTING_DCS=$(echo "$VOLUMES" | jq -r '.data.myself.networkVolumes[] | .dataCenterId' | sort -u)
          POD_ID=""
          USED_DC=""
          NEW_VOLUME_CREATED=false

          # ── Helper: try creating a pod (spot then on-demand) ──
          # Usage: try_create_pod GPU DATACENTER VOLUME_ID
          # Sets POD_ID and USED_DC on success
          try_create_pod() {
            local gpu="$1" dc="$2" vol="$3"

            # Try spot first
            local bid
            bid=$(get_bid_price "$gpu")
            echo "  Trying $gpu spot (bid: \$$bid/hr)..."
            local resp
            resp=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d "{
                \"query\": \"mutation { podRentInterruptable(input: { name: \\\"kiki-comfyui\\\", imageName: \\\"runpod/comfyui:latest\\\", gpuTypeId: \\\"${gpu}\\\", gpuCount: 1, bidPerGpu: ${bid}, volumeInGb: 0, containerDiskInGb: 20, networkVolumeId: \\\"${vol}\\\", volumeMountPath: \\\"/workspace\\\", ports: \\\"8188/http,22/tcp\\\", dataCenterId: \\\"${dc}\\\", startSsh: true }) { id } }\"
              }" || true)

            POD_ID=$(echo "$resp" | jq -r '.data.podRentInterruptable.id // empty')
            if [ -n "$POD_ID" ]; then
              echo "  ✓ Spot pod $POD_ID with $gpu in $dc (bid: \$$bid/hr)"
              USED_DC="$dc"
              return 0
            fi
            # Log why spot failed
            local spot_err
            spot_err=$(echo "$resp" | jq -r '.errors[0].message // empty' 2>/dev/null)
            echo "  Spot failed: ${spot_err:-no error message (response: $(echo "$resp" | jq -c . 2>/dev/null || echo "$resp"))}"

            # Fallback to on-demand
            echo "  Trying on-demand..."
            resp=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d "{
                \"query\": \"mutation { podFindAndDeployOnDemand(input: { name: \\\"kiki-comfyui\\\", imageName: \\\"runpod/comfyui:latest\\\", gpuTypeId: \\\"${gpu}\\\", gpuCount: 1, volumeInGb: 0, containerDiskInGb: 20, networkVolumeId: \\\"${vol}\\\", volumeMountPath: \\\"/workspace\\\", ports: \\\"8188/http,22/tcp\\\", dataCenterId: \\\"${dc}\\\", startSsh: true }) { id } }\"
              }" || true)

            POD_ID=$(echo "$resp" | jq -r '.data.podFindAndDeployOnDemand.id // empty')
            if [ -n "$POD_ID" ]; then
              echo "  ✓ On-demand pod $POD_ID with $gpu in $dc"
              USED_DC="$dc"
              return 0
            fi
            # Log why on-demand failed
            local od_err
            od_err=$(echo "$resp" | jq -r '.errors[0].message // empty' 2>/dev/null)
            echo "  On-demand failed: ${od_err:-no error message (response: $(echo "$resp" | jq -c . 2>/dev/null || echo "$resp"))}"
            return 1
          }

          # ── Phase 2: Try existing volumes (spot then on-demand) ──
          if [ -n "$EXISTING_DCS" ]; then
            echo "::group::Trying existing datacenters"
            for DATACENTER in $EXISTING_DCS; do
              VOLUME_ID=$(echo "$VOLUMES" | jq -r ".data.myself.networkVolumes[] | select(.dataCenterId == \"$DATACENTER\") | .id" | head -1)
              echo "Trying $DATACENTER (volume: $VOLUME_ID)..."

              for GPU in "${GPU_TYPES[@]}"; do
                if try_create_pod "$GPU" "$DATACENTER" "$VOLUME_ID"; then
                  break 2
                fi
              done
            done
            echo "::endgroup::"
          fi

          # ── Phase 3: No existing DC worked — dynamically discover new ones ──
          if [ -z "$POD_ID" ]; then
            echo ""
            echo "⚠️  No GPU available in existing datacenters ($EXISTING_DCS)"
            echo ""

            if [ "$VOLUME_COUNT" -ge "$MAX_VOLUMES" ]; then
              echo "::error::Cannot create new volume — already at $VOLUME_COUNT/$MAX_VOLUMES limit"
              exit 1
            fi

            echo "::group::Querying all datacenters for GPU availability"

            # Query RunPod datacenters — minMemoryInGb: 80 filters out most small GPUs.
            # API doesn't support gpuTypeId filtering, so we filter for H100s with jq below.
            DC_AVAIL_RAW=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d '{
                "operationName": "getAllDatacenters",
                "query": "query getAllDatacenters($input: GpuAvailabilityInput) { dataCenters { id name storageSupport gpuAvailability(input: $input) { stockStatus gpuTypeId gpuTypeDisplayName } } }",
                "variables": { "input": { "gpuCount": 1, "secureCloud": false, "minMemoryInGb": 80 } }
              }')

            # Validate we got data back (API schema might change)
            DC_COUNT=$(echo "$DC_AVAIL_RAW" | jq '.data.dataCenters | length // 0' 2>/dev/null)
            if [ -z "$DC_COUNT" ] || [ "$DC_COUNT" = "0" ] || [ "$DC_COUNT" = "null" ]; then
              echo "::warning::dataCenters query returned no results — API schema may have changed"
              echo "Response: $(echo "$DC_AVAIL_RAW" | jq -c . 2>/dev/null || echo "$DC_AVAIL_RAW")"
              echo "::error::No GPU available (dynamic datacenter discovery failed)"
              exit 1
            fi

            # Build GPU_TYPES as a jq-friendly JSON array for filtering
            GPU_TYPES_JSON=$(printf '%s\n' "${GPU_TYPES[@]}" | jq -R . | jq -s .)

            # Filter response to only include our target GPU types in each DC's availability
            DC_AVAIL=$(echo "$DC_AVAIL_RAW" | jq --argjson gpus "$GPU_TYPES_JSON" '
              .data.dataCenters |= [.[] | .gpuAvailability |= [.[] | select(.gpuTypeId as $id | $gpus | index($id))]]')

            # Log DCs that have our target GPUs
            echo "Found $DC_COUNT datacenters. DCs with H100 availability:"
            echo "$DC_AVAIL" | jq '[.data.dataCenters[]
              | select(.gpuAvailability | length > 0)
              | {id, name, storage: .storageSupport, gpus: [.gpuAvailability[] | {type: .gpuTypeId, stock: .stockStatus}]}]'

            # Build ordered candidate list: GPU preference × stock level (High > Medium > Low > Unknown)
            # Format: GPU|DC|existing  (existing = "yes" if we have a volume there, "no" otherwise)
            # Include existing-volume DCs too — Phase 2 tried them but DC query may show fresh stock
            # "Unknown" handles DCs where the API returns null for stockStatus
            CANDIDATE_LIST=""
            for GPU in "${GPU_TYPES[@]}"; do
              for STOCK_PREF in "High" "Medium" "Low" "Unknown"; do
                AVAILABLE_DCS=$(echo "$DC_AVAIL" | jq -r --arg gpu "$GPU" --arg stock "$STOCK_PREF" '
                  [.data.dataCenters[]
                   | select(.storageSupport == true or .storageSupport == "true")
                   | select(any(.gpuAvailability[];
                       .gpuTypeId == $gpu and
                       (if $stock == "Unknown" then .stockStatus == null
                        else .stockStatus == $stock end)))
                   | .id] | .[]')

                for DC in $AVAILABLE_DCS; do
                  HAS_VOL="no"
                  for EXISTING in $EXISTING_DCS; do
                    if [ "$DC" = "$EXISTING" ]; then HAS_VOL="yes"; break; fi
                  done
                  CANDIDATE_LIST="${CANDIDATE_LIST}${GPU}|${DC}|${HAS_VOL}\n"
                done
              done
            done

            # Deduplicate (keep first occurrence = highest priority)
            CANDIDATE_LIST=$(echo -e "$CANDIDATE_LIST" | awk '!seen[$0]++' | head -20)
            echo "Candidate DCs to try (includes existing-volume DCs for retry):"
            echo "$CANDIDATE_LIST"
            echo "::endgroup::"

            if [ -z "$CANDIDATE_LIST" ]; then
              echo "::error::No GPU available in any datacenter (checked $DC_COUNT RunPod datacenters dynamically)"
              exit 1
            fi

            # ── Phase 4+5: Try candidates — reuse existing volumes or create new ones ──
            VOLUMES_CREATED=()
            while IFS='|' read -r CAND_GPU CAND_DC HAS_VOL; do
              [ -z "$CAND_DC" ] && continue

              if [ "$HAS_VOL" = "yes" ]; then
                # Retry existing volume DC with fresh stock data
                VOLUME_ID=$(echo "$VOLUMES" | jq -r ".data.myself.networkVolumes[] | select(.dataCenterId == \"$CAND_DC\") | .id" | head -1)
                echo ""
                echo "🔄 Retrying existing volume $VOLUME_ID in $CAND_DC (fresh stock: $CAND_GPU)..."
                if try_create_pod "$CAND_GPU" "$CAND_DC" "$VOLUME_ID"; then
                  break
                fi
              else
                # New DC — create volume first
                if [ "$VOLUME_COUNT" -ge "$MAX_VOLUMES" ]; then
                  echo "::warning::Volume limit reached ($VOLUME_COUNT/$MAX_VOLUMES), skipping new DC $CAND_DC"
                  continue
                fi

                echo ""
                echo "📦 Creating network volume in $CAND_DC for $CAND_GPU..."
                echo "   Total volumes after creation: $((VOLUME_COUNT + 1)) of $MAX_VOLUMES max"

                VOL_RESP=$(curl -sf "$API_URL" \
                  -H 'Content-Type: application/json' \
                  -d "{
                    \"query\": \"mutation { createNetworkVolume(input: { name: \\\"kiki-${CAND_DC,,}\\\", dataCenterId: \\\"${CAND_DC}\\\", size: 50 }) { id name dataCenterId } }\"
                  }")

                VOLUME_ID=$(echo "$VOL_RESP" | jq -r '.data.createNetworkVolume.id // empty')
                if [ -z "$VOLUME_ID" ]; then
                  echo "::warning::Failed to create volume in $CAND_DC, skipping"
                  echo "$VOL_RESP" | jq . 2>/dev/null || true
                  continue
                fi
                echo "✓ Created volume $VOLUME_ID in $CAND_DC"
                VOLUMES_CREATED+=("$VOLUME_ID")
                VOLUME_COUNT=$((VOLUME_COUNT + 1))
                NEW_VOLUME_CREATED=true

                sleep 3

                if try_create_pod "$CAND_GPU" "$CAND_DC" "$VOLUME_ID"; then
                  break
                fi
                echo "  GPU unavailable in $CAND_DC after volume creation, trying next..."
              fi
            done <<< "$CANDIDATE_LIST"

            if [ -z "$POD_ID" ]; then
              echo "::error::Exhausted all candidate DCs — no GPU available (tried ${#VOLUMES_CREATED[@]} new DCs + existing DCs)"
              exit 1
            fi
          fi

          echo "pod_id=$POD_ID" >> "$GITHUB_OUTPUT"
          echo "proxy_url=https://${POD_ID}-8188.proxy.runpod.net" >> "$GITHUB_OUTPUT"
          echo "datacenter=$USED_DC" >> "$GITHUB_OUTPUT"
          echo "new_volume=$NEW_VOLUME_CREATED" >> "$GITHUB_OUTPUT"

      - name: Wait for pod to boot and get SSH info
        id: ssh_info
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          set -euo pipefail
          POD_ID="${{ steps.create.outputs.pod_id }}"
          API_URL="https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}"

          echo "Waiting for pod to start..."
          POD_READY=false
          for i in $(seq 1 60); do
            STATUS=$(curl -sf "$API_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"query\": \"query { pod(input: { podId: \\\"${POD_ID}\\\" }) { runtime { uptimeInSeconds ports { ip isIpPublic privatePort publicPort type } } } }\"}")

            UPTIME=$(echo "$STATUS" | jq -r '.data.pod.runtime.uptimeInSeconds // 0')
            if [ "$UPTIME" -gt 5 ] 2>/dev/null; then
              echo "Pod is running (uptime: ${UPTIME}s)"
              SSH_IP=$(echo "$STATUS" | jq -r '.data.pod.runtime.ports[] | select(.privatePort == 22) | .ip')
              SSH_PORT=$(echo "$STATUS" | jq -r '.data.pod.runtime.ports[] | select(.privatePort == 22) | .publicPort')

              if [ -n "$SSH_IP" ] && [ "$SSH_IP" != "null" ]; then
                echo "SSH: $SSH_IP:$SSH_PORT"
                echo "ssh_ip=$SSH_IP" >> "$GITHUB_OUTPUT"
                echo "ssh_port=$SSH_PORT" >> "$GITHUB_OUTPUT"
                POD_READY=true
                break
              fi
            fi
            echo "  Waiting... (${i}/60)"
            sleep 5
          done

          if [ "$POD_READY" != "true" ]; then
            echo "::error::Pod failed to start within 5 minutes"
            exit 1
          fi

      - name: Set up models and custom nodes via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RUNPOD_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          SSH_IP="${{ steps.ssh_info.outputs.ssh_ip }}"
          SSH_PORT="${{ steps.ssh_info.outputs.ssh_port }}"

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/runpod_key
          chmod 600 ~/.ssh/runpod_key

          SSH_CMD="ssh -i ~/.ssh/runpod_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -p $SSH_PORT root@$SSH_IP"

          echo "Waiting for SSH..."
          SSH_CONNECTED=false
          for i in $(seq 1 12); do
            if $SSH_CMD "echo ok" 2>/dev/null; then
              echo "SSH connected!"
              SSH_CONNECTED=true
              break
            fi
            echo "  SSH attempt ${i}/12..."
            sleep 5
          done

          if [ "$SSH_CONNECTED" != "true" ]; then
            echo "::error::Failed to connect via SSH after 1 minute"
            exit 1
          fi

          scp -i ~/.ssh/runpod_key -o StrictHostKeyChecking=no -P "$SSH_PORT" \
            scripts/setup-pod.sh root@"$SSH_IP":/tmp/setup-pod.sh

          $SSH_CMD "chmod +x /tmp/setup-pod.sh && /tmp/setup-pod.sh"

      - name: Wait for ComfyUI with models loaded
        run: |
          PROXY_URL="${{ steps.create.outputs.proxy_url }}"
          echo "Polling $PROXY_URL/system_stats ..."
          for i in $(seq 1 60); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${PROXY_URL}/system_stats" 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "ComfyUI is live!"
              curl -s "${PROXY_URL}/system_stats" | jq .
              break
            fi
            echo "  Attempt ${i}/60 (HTTP $CODE)"
            sleep 10
          done

      - name: Update Railway COMFYUI_URL
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          PROJECT_ID="c651eed9-55bb-464b-98f3-6d8369565740"
          ENVIRONMENT_ID="4d26f403-75b1-4177-a198-282cccc311b4"
          SERVICE_ID="bbf5c42d-7020-41a1-924b-a9c24ac49a88"
          COMFYUI_URL="${{ steps.create.outputs.proxy_url }}"

          RESPONSE=$(curl -sf "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation { variableUpsert(input: { projectId: \\\"${PROJECT_ID}\\\", environmentId: \\\"${ENVIRONMENT_ID}\\\", serviceId: \\\"${SERVICE_ID}\\\", name: \\\"COMFYUI_URL\\\", value: \\\"${COMFYUI_URL}\\\" }) }\"
            }")
          echo "Railway COMFYUI_URL updated to $COMFYUI_URL"

      - name: Summary
        if: always()
        run: |
          POD_ID="${{ steps.create.outputs.pod_id }}"
          PROXY_URL="${{ steps.create.outputs.proxy_url }}"
          DATACENTER="${{ steps.create.outputs.datacenter }}"
          NEW_VOL="${{ steps.create.outputs.new_volume }}"

          echo "## Spot Pod Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Pod ID** | \`$POD_ID\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Datacenter** | $DATACENTER |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **ComfyUI URL** | $PROXY_URL |" >> "$GITHUB_STEP_SUMMARY"
          if [ "$NEW_VOL" = "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> **Note:** A new network volume was created in $DATACENTER because no GPU was available in existing datacenters. This adds ~\$2/month storage cost." >> "$GITHUB_STEP_SUMMARY"
          fi

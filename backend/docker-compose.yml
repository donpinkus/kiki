version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kiki-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kiki
      POSTGRES_PASSWORD: kiki_dev
      POSTGRES_DB: kiki
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kiki-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
